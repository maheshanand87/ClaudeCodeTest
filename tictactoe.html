<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.04); }

    #restart-btn {
      background: #e94560;
      color: #fff;
    }

    #mode-btn {
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc44;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #aaa;
    }

    .score-item span {
      font-size: 1.6rem;
      font-weight: bold;
      display: block;
      text-align: center;
    }

    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a8dadc; }
    .score-item.draw-score span { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="restart-btn">Restart</button>
    <button id="mode-btn">vs Computer</button>
  </div>

  <div id="score">
    <div class="score-item x-score">X <span id="x-score">0</span></div>
    <div class="score-item draw-score">Draws <span id="draw-score">0</span></div>
    <div class="score-item o-score">O <span id="o-score">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };

    const cells    = document.querySelectorAll('.cell');
    const status   = document.getElementById('status');
    const modeBtn  = document.getElementById('mode-btn');

    vsComputer = false;

    function init() {
      board    = Array(9).fill('');
      current  = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], line: [a, b, c] };
      }
      if (board.every(v => v)) return { winner: 'draw' };
      return null;
    }

    function highlightWin(line) {
      line.forEach(i => cells[i].classList.add('win'));
    }

    function applyMove(i) {
      board[i]          = current;
      cells[i].textContent = current;
      cells[i].classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          status.textContent = "It's a draw!";
          scores.D++;
          document.getElementById('draw-score').textContent = scores.D;
        } else {
          status.textContent = `${result.winner} wins!`;
          highlightWin(result.line);
          scores[result.winner]++;
          document.getElementById(`${result.winner.toLowerCase()}-score`).textContent =
            scores[result.winner];
        }
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;

      if (vsComputer && current === 'O') {
        setTimeout(computerMove, 300);
      }
    }

    function minimax(b, isMax) {
      const r = checkBoardResult(b);
      if (r === 'X') return -10;
      if (r === 'O') return  10;
      if (r === 'draw') return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = '';
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = '';
          }
        });
        return best;
      }
    }

    function checkBoardResult(b) {
      for (const [a, c, d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      if (b.every(v => v)) return 'draw';
      return null;
    }

    function computerMove() {
      if (gameOver) return;
      let bestVal = -Infinity, bestMove = -1;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const val = minimax(board, false);
          board[i] = '';
          if (val > bestVal) { bestVal = val; bestMove = i; }
        }
      });
      if (bestMove !== -1) applyMove(bestMove);
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;
        if (vsComputer && current === 'O') return;
        applyMove(i);
      });
    });

    document.getElementById('restart-btn').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      scores = { X: 0, O: 0, D: 0 };
      ['x','o','draw'].forEach(k =>
        document.getElementById(`${k}-score`).textContent = 0);
      init();
    });

    init();
  </script>
</body>
</html>
